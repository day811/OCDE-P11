    <!DOCTYPE html>
    <html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>RAG Chatbot - Événements Culturels</title>
        <style>
            * { margin: 0; padding: 0; box-sizing: border-box; }
            body { 
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                padding: 20px;
            }
            .container {
                background: white;
                border-radius: 12px;
                box-shadow: 0 20px 60px rgba(0,0,0,0.3);
                width: 100%;
                max-width: 600px;
                height: 90vh;
                max-height: 700px;
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }
            .header {
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                color: white;
                padding: 20px;
                text-align: center;
            }
            .header h1 { font-size: 24px; margin-bottom: 5px; }
            .header p { font-size: 12px; opacity: 0.9; }
            #messages {
                flex: 1;
                overflow-y: auto;
                padding: 20px;
                background: #f8f9fa;
            }
            .message {
                margin-bottom: 15px;
                animation: slideIn 0.3s ease;
            }
            @keyframes slideIn {
                from { opacity: 0; transform: translateY(10px); }
                to { opacity: 1; transform: translateY(0); }
            }
            .user-msg {
                display: flex;
                justify-content: flex-end;
            }
            .user-msg .text {
                background: #667eea;
                color: white;
                padding: 12px 16px;
                border-radius: 12px;
                max-width: 70%;
                word-wrap: break-word;
            }
            .bot-msg {
                display: flex;
                justify-content: flex-start;
                flex-direction: column;
            }
            .bot-msg .text {
                background: white;
                color: #333;
                padding: 12px 16px;
                border-radius: 12px;
                max-width: 70%;
                border: 1px solid #e0e0e0;
                word-wrap: break-word;
            }
            .bot-msg .sources {
                font-size: 12px;
                color: #666;
                margin-top: 8px;
                max-width: 70%;
                padding-left: 12px;
            }
            .loading { color: #667eea; }
            .input-area {
                padding: 15px;
                border-top: 1px solid #e0e0e0;
                display: flex;
                gap: 10px;
            }
            #input {
                flex: 1;
                padding: 12px;
                border: 1px solid #e0e0e0;
                border-radius: 24px;
                font-size: 14px;
                outline: none;
            }
            #input:focus { border-color: #667eea; }
            button {
                background: #667eea;
                color: white;
                border: none;
                padding: 12px 24px;
                border-radius: 24px;
                cursor: pointer;
                font-weight: 600;
            }
            button:hover { background: #764ba2; }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="header">
                <h1>🎭 Événements Culturels</h1>
                <p>Assistant intelligent - Occitanie</p>
            </div>
            <div id="messages"></div>
            <div class="input-area">
                <input type="text" id="input" placeholder="Posez une question...">
                <button onclick="sendMessage()">Envoyer</button>
            </div>
        </div>

        <script>
        async function sendMessage() {
            const input = document.getElementById('input');
            const question = input.value.trim();
            if (!question) return;
            
            const messagesDiv = document.getElementById('messages');
            
            // Affiche question utilisateur
            messagesDiv.innerHTML += '<div class="message user-msg"><div class="text">' + 
                question.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</div></div>';
            
            // Affiche indicateur chargement
            const loadingId = 'loading-' + Date.now();
            messagesDiv.innerHTML += '<div class="message bot-msg"><div class="text loading" id="' + 
                loadingId + '">Réponse en cours...</div></div>';
            
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            input.value = '';
            
            try {
                const response = await fetch('/api/chat?question=' + encodeURIComponent(question), {
                    method: 'POST'
                });
                
                const data = await response.json();
                
                // Retire indicateur chargement
                const loadingDiv = document.getElementById(loadingId);
                if (loadingDiv) loadingDiv.parentElement.parentElement.remove();
                
                // Affiche réponse
                let html = '<div class="message bot-msg"><div class="text">' + 
                    data.response.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</div>';
                
                if (data.sources && data.sources.length > 0) {
                    html += '<div class="sources"><strong>Sources:</strong><br>';
                    data.sources.forEach(s => {
                        html += '• ' + (s.city || 'N/A') + '<br>';
                    });
                    html += '</div>';
                }
                
                html += '</div></div>';
                messagesDiv.innerHTML += html;
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
                
            } catch (error) {
                console.error('Erreur:', error);
                messagesDiv.innerHTML += '<div class="message bot-msg"><div class="text">❌ Erreur de connexion</div></div>';
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            }
        }
        
        document.getElementById('input').addEventListener('keypress', e => {
            if (e.key === 'Enter') sendMessage();
        });
        
        document.getElementById('input').focus();
        </script>
    </body>
    </html>
