<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Chatbot - Événements Culturels</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 1200px;
            height: 90vh;
            max-height: 800px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 12px;
            opacity: 0.9;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 15px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user-msg {
            display: flex;
            justify-content: flex-end;
        }

        .user-msg .text {
            background: #667eea;
            color: white;
            padding: 12px 16px;
            border-radius: 12px;
            max-width: 70%;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .bot-msg {
            display: flex;
            justify-content: flex-start;
            flex-direction: column;
            max-width: 70%;
        }

        .bot-msg .text {
            background: white;
            color: #333;
            padding: 12px 16px;
            border-radius: 12px 12px 0 12px;
            border: 1px solid #e0e0e0;
            word-wrap: break-word;
            white-space: pre-wrap;
            line-height: 1.5;
        }

        .bot-msg .sources {
            background: #f5f5f5;
            font-size: 12px;
            color: #666;
            margin-top: 0;
            padding: 8px 12px;
            border: 1px solid #e0e0e0;
            border-top: none;
            border-left: 3px solid #667eea;
        }

        .source-item {
            margin-bottom: 6px;
            font-size: 11px;
        }

        .source-item:last-child {
            margin-bottom: 0;
        }

        .source-title {
            font-weight: 600;
            color: #333;
        }

        .source-info {
            color: #666;
            font-size: 10px;
            margin-top: 2px;
        }

        .tokens-info {
            background: #f0f0f0;
            font-size: 12px;
            color: #555;
            padding: 6px 12px;
            border: 1px solid #d0d0d0;
            border-top: none;
            text-align: right;
            border-radius: 0 0 12px 12px;
            font-family: 'Monaco', 'Courier New', monospace;
        }

        .loading {
            color: #667eea;
            font-style: italic;
        }

        .input-area {
            padding: 15px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 24px;
            font-size: 14px;
            outline: none;
        }

        input:focus {
            border-color: #667eea;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 24px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }

        button:hover {
            background: #764ba2;
        }

        button:active {
            transform: scale(0.98);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>Événements Culturels</h1>
            <p>Assistant intelligent - Occitanie</p>
        </div>
        <div id="messages"></div>
        <div class="input-area">
            <input type="text" id="input" placeholder="Posez une question...">
            <button onclick="sendMessage()">Envoyer</button>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('input');
            const question = input.value.trim();

            if (!question) return;

            const messagesDiv = document.getElementById('messages');

            // Display user question
            const userMsg = document.createElement('div');
            userMsg.className = 'message user-msg';
            const userText = document.createElement('div');
            userText.className = 'text';
            userText.textContent = question;
            userMsg.appendChild(userText);
            messagesDiv.appendChild(userMsg);

            // Show loading indicator
            const loadingId = 'loading-' + Date.now();
            const loadingMsg = document.createElement('div');
            loadingMsg.className = 'message bot-msg';
            const loadingText = document.createElement('div');
            loadingText.className = 'text loading';
            loadingText.id = loadingId;
            loadingText.textContent = 'Réponse en cours...';
            loadingMsg.appendChild(loadingText);
            messagesDiv.appendChild(loadingMsg);

            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            input.value = '';

            try {
                // Make API request
                const response = await fetch('/api/v1/search', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        question: question,
                        top_k: 5
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();

                console.log('API Response:', data);

                // Remove loading indicator
                loadingMsg.id = loadingId;
                const loadingElement = document.getElementById(loadingId);
                if (loadingElement) {
                    loadingElement.remove();
                }

                // Create bot message container
                const botMsg = document.createElement('div');
                botMsg.className = 'message bot-msg';

                // Add answer text
                const answerDiv = document.createElement('div');
                answerDiv.className = 'text';
                answerDiv.textContent = data.answer || 'Pas de réponse disponible';
                botMsg.appendChild(answerDiv);

                // Add sources if available
                if (data.sources && Array.isArray(data.sources) && data.sources.length > 0) {
                    const sourcesDiv = document.createElement('div');
                    sourcesDiv.className = 'sources';

                    const sourcesTitle = document.createElement('strong');
                    sourcesTitle.textContent = `Sources (${data.sources.length})`;
                    sourcesDiv.appendChild(sourcesTitle);

                    data.sources.forEach((source, idx) => {
                        // Add separator between items
                        if (idx > 0) {
                            sourcesDiv.appendChild(document.createElement('hr'));
                        }

                        const sourceItem = document.createElement('div');
                        sourceItem.className = 'source-item';

                        const title = document.createElement('div');
                        title.className = 'source-title';
                        title.textContent = source.title || 'Sans titre';
                        sourceItem.appendChild(title);

                        const info = document.createElement('div');
                        info.className = 'source-info';
                        const city = source.city || 'NA';
                        const dateStr = source.dates
                            ? (Array.isArray(source.dates) ? source.dates[0] : source.dates)
                            : 'NA';
                        info.textContent = `${city} • ${dateStr}`;
                        sourceItem.appendChild(info);

                        sourcesDiv.appendChild(sourceItem);
                    });

                    botMsg.appendChild(sourcesDiv);
                }

                // Add stats (tokens + execution time) - ALWAYS at the bottom
                const statsDiv = document.createElement('div');
                statsDiv.className = 'tokens-info';

                const stats = [];
                if (data.total_tokens) {
                    stats.push(`📊 ${data.total_tokens} tokens`);
                }
                if (data.execution_time !== undefined && data.execution_time !== null) {
                    const execTime = parseFloat(data.execution_time).toFixed(2);
                    stats.push(`⏱️ ${execTime}s`);
                }

                if (stats.length > 0) {
                    statsDiv.textContent = stats.join(' • ');
                    botMsg.appendChild(statsDiv);
                }

                messagesDiv.appendChild(botMsg);
                messagesDiv.scrollTop = messagesDiv.scrollHeight;

            } catch (error) {
                console.error('Error:', error);

                // Remove loading message on error
                const loadingElement = document.getElementById(loadingId);
                if (loadingElement) {
                    loadingElement.remove();
                }

                // Show error
                const errorMsg = document.createElement('div');
                errorMsg.className = 'message bot-msg';
                const errorText = document.createElement('div');
                errorText.className = 'text';
                errorText.style.backgroundColor = '#ffe0e0';
                errorText.style.color = '#d32f2f';
                errorText.innerHTML = `❌ <strong>Erreur:</strong> ${error.message}`;
                errorMsg.appendChild(errorText);
                messagesDiv.appendChild(errorMsg);
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            }
        }

        // Send on Enter key
        document.getElementById('input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Auto-focus input
        document.getElementById('input').focus();
    </script>
</body>

</html>
